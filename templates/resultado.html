<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
<h1>Resultados de Ping - {{ tipo }}</h1>
<a href="/" class="btn btn-secondary mb-3">Volver al menú</a>
<table class="table table-bordered">
<tr>
<th>Nombre</th>
<th>Estado</th>
<th>Intentos</th>
</tr>
{% for r in resultados %}
<tr class="table-{% if r.estado == 'Online' %}success{% else %}danger{% endif %}">
<td>{{ r.nombre }}</td>
<td>{{ r.estado }}</td>
<td>{{ r.intentos }}</td>
</tr>
{% endfor %}
</table>
</div>
</body>
</html>
