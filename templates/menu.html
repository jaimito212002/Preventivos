<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Preventivos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="/static/style.css">
</head>
<body>

<header>Preventivos - Monitor de Dispositivos</header>


<div class="container mt-4 mb-5">
  <div class="row g-4">

    {% set tipos = ['APs','Switches','Servidores','Servidores Suecia','Impresoras','Cajas','Pinpads/Datáfonos'] %}
    {% for t in tipos %}
      <div class="col-md-4 col-sm-6">
        <div class="card text-center p-4 shadow">
          <h4>{{ t }}</h4>
          <form method="post" action="/ping_tipo">
            <input type="hidden" name="tipo" value="{{ t }}">
            <button type="submit" class="btn btn-ping mt-3">Ping</button>
          </form>
        </div>
      </div>
    {% endfor %}

  </div>
</div>



<div class="row mt-4">
  <div class="col-12 text-center">
    <a href="/add_dispositivo" class="btn btn-warning btn-lg">Añadir Nuevo Dispositivo</a>
  </div>
</div>

<footer>© 2026 Preventivos - Empresa</footer>

</body>
</html>
